name: Build Ultron

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install WebView2
        run: |
          $WebView2InstallPath = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest "https://go.microsoft.com/fwlink/p/?linkid=2124701" -OutFile $WebView2InstallPath
          Start-Process -FilePath $WebView2InstallPath -Args "/silent /install" -Wait

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        shell: powershell
        run: npm install -g @tauri-apps/cli

      - name: Check Tauri CLI
        shell: powershell
        run: |
          where.exe tauri 2>&1
          npx --help 2>&1 | head -5
          npm list -g @tauri-apps/cli 2>&1

      - name: Build app
        shell: powershell
        run: |
          npx --yes @tauri-apps/cli build --bundles msi 2>&1
          if (-not $?) { throw "Build failed with exit code $LASTEXITCODE" }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Ultron-Installer
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: Ultron-EXE
          path: src-tauri/target/release/ultron.exe
